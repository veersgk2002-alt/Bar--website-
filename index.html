    <!-- ABOUT -->

        <h2>About Us</h2>

    <!-- SIGNATURE DRINKS -->

<h2>Visit Us</h2>

<div class="map">

<iframe
src="https://www.google.com/maps?q=Ramada+Gurgaon+Central&output=embed"
width="100%"
height="350"

allowfullscreen=""
loading="lazy">
</iframe>

</section>
<script>

let slides = document.querySelectorAll(".slide");
let index = 0;

function showSlide(){
    slides.forEach(s => s.classList.remove("active"));
    slides[index].classList.add("active");
    index = (index + 1) % slides.length;
}

showSlide();
setInterval(showSlide, 4000);

</script>

</body>
